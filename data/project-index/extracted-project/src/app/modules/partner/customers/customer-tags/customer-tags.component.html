 <ng-template #actionHeader>
  <div class="header-actions d-flex align-items-center gap-2 gap-lg-3">
    <button type="button" class="btn btn-sm btn-light-primary" (click)="backToCustomers()">
      <i class="ki-outline ki-to-left fs-2"></i>&nbsp;<span translate="TRANSLATE.CUSTOMER_SUBSCRIPTIONS_BUTTON_TEXT_BACK_TO_CUSTOMERS"></span>
    </button> 
   
  </div>
</ng-template>

<div class="card">
    <div class="card-body pt-0 overflow-auto">
      <ng-template #actions let-data="adtData" let-emitter="captureEvents">
        <div class="d-flex">
          <!-- Add your action buttons or other elements here -->
          <div class="d-flex justify-content-end">
            <div  class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto" [appPermission]="'ADD_OR_UPDATE_TAGS'"
              [ngClass]="toolbarButtonHeightClass" (click)="editTag(data)">
              <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg me-md-2 h-20px w-20px" ngbTooltip="{{'TRANSLATE.CUSTOMER_TAGS_TABLE_BUTTON_TOOLTIP_EDIT'|translate}}">
                <i class="ki-outline ki-pencil text-primary">
                    <!-- <span class="path1"></span>
                    <span class="path2"></span> -->
                </i>
              </span>
            </div>
          </div>
          <div class="d-flex">
            <div class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto" [appPermission]="'DELETE_TAGS'"
              [ngClass]="toolbarButtonHeightClass" (click)="deleteCustomerTag(data)">
              <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg me-md-2 h-20px w-20px" ngbTooltip="{{'TRANSLATE.CUSTOMER_TAGS_TABLE_BUTTON_TOOLTIP_DELETE'|translate}}">
                <i class="ki-outline ki-trash text-primary">
                   <!-- <span class="path1"></span>
                   <span class="path2"></span>
                   <span class="path3"></span>
                   <span class="path4"></span>
                   <span class="path5"></span> -->
                </i>
              </span>
            </div>
          </div>
          </div>
      </ng-template>

      <div class="col-md-12 d-flex justify-content-end my-2 pt-1">
        <button type="button" class="btn btn-sm btn-primary"  (click)="addTags()" [appPermission]="'ADD_OR_UPDATE_TAGS'"  appBusyLoader>
          <i class="ki-outline ki-plus fs-2"></i> <span translate="TRANSLATE.BUTTONS_TEXT_ADD_PARTNER_USER_TAG"></span>
        </button>
      </div>

      <!-- Check if datatableConfig is defined and then render the table -->
      <ng-container *ngIf="datatableConfig">
        <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig">
        </app-c3-table>
      </ng-container>
    </div>
  </div>
