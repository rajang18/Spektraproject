<ng-template #actionHeader>
  <div class="d-flex justify-content-end align-items-center gap-2 gap-lg-3 mt-3 mb-5" *ngIf="entityName.toLowerCase() === cloudHubConstants.ENTITY_PARTNER.toLowerCase() || entityName.toLowerCase() === cloudHubConstants.ENTITY_RESELLER.toLowerCase() ">
    <button type="button" class="btn btn-sm fw-bold btn-light-primary" (click)="showHelpText = !showHelpText">
      <span translate="TRANSLATE.CHANGE_PLAN_HELP"></span>&nbsp;
      <i class="fa fa-question-circle"></i>
    </button>
    <button type="button" class="btn btn-sm fw-semibold btn-light-primary" (click)="backToCustomer()">
      <i class="ki-outline ki-to-left fs-2"></i> <span
        translate="TRANSLATE.PARTNER_REPORTS_BTN_TEXT_BACK_TO_CUSTOMERS"></span>
    </button>  
  </div>
</ng-template>

<div class="card card-custom">
  <!-- begin::Header -->
  <div class="card-header">
    <ul class="nav nav-stretch nav-line-tabs fw-bold border-transparent flex-nowrap" role="tablist">
      <li class="nav-item" [appPermission]="'GET_RECONCILIATION_REPORT'">
        <a (click)="navigateTab('partnerReconciliationReport')" routerLinkActive="active" class="nav-link cursor-pointer"
          role="tab" (click)="setActiveTab(tabs.ReconciliationReport)" routerLinkActive="text-primary active" [routerLinkActiveOptions]="{ exact: true }">
          <span translate="TRANSLATE.CUSTOMER_RECONCILIATION_REPORT"></span>
        </a>
      </li>
      <li class="nav-item" [appPermission]="'VIEW_LICENSE_CONSUMPTION_REPORT'">
        <a (click)="navigateTab('partnerLicenseConsumptionReport')" routerLinkActive="active" class="nav-link cursor-pointer"
          role="tab" (click)="setActiveTab(tabs.LicenseConsumptionReport)"routerLinkActive="text-primary active" [routerLinkActiveOptions]="{ exact: true }">
          <span translate="TRANSLATE.LICENSE_CONSUMPTION_REPORT"></span>
        </a>
      </li>
    </ul>

  </div>

  <!-- BEGIN :: Reconciliation Note-->
    <div class="ps-0 pe-0" *ngIf="showHelpText">
      <div class="row mt-2 notice bg-light-primary rounded border-primary border border-dashed min-w-lg-600px flex-shrink-0 p-6 m-0 ms-3 me-3">
        <ul class="ms-12 col-12">
          <li>
            <span [innerHTML]="('TRANSLATE.RECONCILIATION_NOTES_MISMATCH')|translate"></span>
          </li>
          <li>
            <span [innerHTML]="('TRANSLATE.RECONCILIATION_NOTES_SUSPENDED')|translate"></span>
          </li>
          <li>
            <span [innerHTML]="('TRANSLATE.RECONCILIATION_NOTES_PROMOTION_MISMATCH')|translate"></span>
          </li>
          <li>
            <span translate="TRANSLATE.RECONCILIATION_NOTES_RI_INVOICE"></span>
          </li>
        </ul>
      </div>
    </div>
  <!--END :: Reconciliation Note -->

  <div class="card-body">
    <router-outlet></router-outlet>
  </div>
</div>
