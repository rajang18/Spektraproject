<ng-template #actionHeader>
  <div class="header-actions d-flex align-items-center gap-2 gap-lg-3">
    <a  class="btn btn-sm fw-bold btn-light-primary"  (click)="downloadAccountManagerDetails()"  ngbTooltip="{{'TRANSLATE.BUTTON_TEXT_DOWNLOAD_ACCOUNT_MANAGERS' | translate}}">
      <i class="ki-outline ki-exit-down fs-2"></i>
    </a> 
    <button type="button" class="btn btn-sm fw-bold btn-secondary" (click)="displayFilter()" ngbTooltip="{{'TRANSLATE.BTN_TEXT_SHOW_FILTERS' | translate}}">
      <i class="ki-outline ki-filter fs-2"></i>
      &nbsp;<span translate="TRANSLATE.BTN_TEXT_FILTER"></span>
    </button> 
    <button type="button" class="btn btn-sm fw-bold btn-primary" [appPermission]="'SAVEORUPDATEACCOUNTMANAGER'"  (click)="addAccountManager()" appBusyLoader>
      <i class="ki-outline ki-plus fs-2"></i> <span translate="TRANSLATE.ACCOUNT_MANAGERS_BUTTON_TEXT_ADD_ACCOUNT_MANAGER"></span>
    </button>
  </div>
</ng-template>
<div class="card">
    <div class="card-body overflow-auto">

      <!-- Filter-start -->
      @if (shouldShowAccountFilter) {
        <div>
          <form class="form">
          <div class="card">
            <div class="card-body">
              <div class="form-group row">
                <div class="col-6 col-sm-6 col-md-3  col-lg-3">
                  <label class="mb-1">
                    {{'TRANSLATE.ACCOUNT_MANAGER_SEARCH_ACCOUNT_MANAGER_ID'|translate}}
                  </label>
                  <input type="text" [(ngModel)]="accountManagerId"  name="AccountManagerId" class="form-control form-control-sm"
                    placeholder="{{'TRANSLATE.ACCOUNT_MANAGER_FILTER_ACCOUNT_MANAGER_ID' | translate}}">
                </div>
                <div class="col-6 col-sm-6 col-md-3  col-lg-3">
                  <label class="mb-1">
                    {{'TRANSLATE.ACCOUNT_MANAGER_SEARCH_FIRST_NAME'|translate}}
                  </label>
                  <input type="text" [(ngModel)]="firstName"  name="FirstName" class="form-control form-control-sm"
                    placeholder="{{'TRANSLATE.ACCOUNT_MANAGER_FILTER_FIRST_NAME' | translate}}">
                </div>
                
                <div class="col-6 col-sm-6 col-md-3  col-lg-3">
                  <label class="mb-1">
                    {{'TRANSLATE.ACCOUNT_MANAGER_SEARCH_LAST_NAME'|translate}}
                  </label>
                  <input type="text" [(ngModel)]="lastName"  name="LastName" class="form-control form-control-sm"
                    placeholder="{{'TRANSLATE.ACCOUNT_MANAGER_FILTER_LAST_NAME' | translate}}">
                </div>
                <div class="col-6 col-sm-6 col-md-3  col-lg-3">
                  <label class="mb-1">
                    {{'TRANSLATE.ACCOUNT_MANAGER_SEARCH_EMAIL_ADDRESS'|translate}}
                  </label>
                  <input type="text" [(ngModel)]="emailAddress" name="EmailAddress" class="form-control form-control-sm"
                    placeholder="{{'TRANSLATE.ACCOUNT_MANAGER_FILTER_EMAIL_ADDRESS' | translate}}">
                </div>
              </div>
              <div class="form-group row pt-4">
                <div class="col-6 col-sm-6 col-md-3  col-lg-3">
                  <label class="mb-1">
                    {{'TRANSLATE.ACCOUNT_MANAGER_SEARCH_PHONE_NUMBER'|translate}}
                  </label>
                  <input type="text" [(ngModel)]="phoneNumber"  name="PhoneNumber" class="form-control form-control-sm"
                    placeholder="{{'TRANSLATE.ACCOUNT_MANAGER_FILTER_PHONE_NUMBER' | translate}}">
                </div>
              </div>
            </div>
            <div class="card-footer py-3">
              <div class="row">
                <div class="col-sm-12 col-md-12 col-xs-12 col-12 col-lg-12 text-lg-end">
                  <button class="btn btn-light-primary btn-sm  me-md-2 me-lg-2 me-sm-2 me-xl-2 me-xxl-2"
                    (click)="searchAccountManager()">
                    {{'TRANSLATE.CUSTOMER_SEARCH_SEARCH_OPTION' | translate}}
                  </button>
                  <button class="btn btn-light-primary btn-sm  me-md-2 me-lg-2 me-sm-2 me-xl-2 me-xxl-2"
                    (click)="resetAccountMangerFilter()">{{'TRANSLATE.CUSTOMER_SEARCH_RESET_OPTION' | translate}}</button>
                  <button class="btn btn-light-primary btn-sm me-md-2 me-lg-2 me-sm-2 me-xl-2 me-xxl-2"
                  (click)="shouldShowAccountFilter = false;">{{'TRANSLATE.CUSTOMER_SEARCH_CLOSE_OPTION' | translate}}</button>
                </div>
              </div>
            </div>
          </div>
          </form>
        </div>
      }

      <!-- Filter-End -->

      <ng-template #actions let-data="adtData" let-emitter="captureEvents">
        <div class="d-flex justify-content-center">
          <div class="d-flex align-items-center">
            <div title="Edit" class="btn btn-icon btn-active-light-primary btn-lg me-1 w-auto" ngbTooltip="{{'TRANSLATE.ACCOUNT_MANAGERS_TABLE_TD_BUTTON_TOOLTIP_TEXT_EDIT_DETAILS' | translate}}"
              [ngClass]="toolbarButtonHeightClass"  (click)="editAccountManagerDetails(data)" placement="top">
              <span class="svg-icon svg-icon-primary svg-icon-sm  h-20px w-20px">
                  <i class="ki-outline ki-pencil fs-3 text-primary"></i>
                </span>
            </div>
          </div>
          <div class="d-flex align-items-center">
            <div class="btn btn-icon btn-active-light-primary btn-lg me-1 w-auto" 
            ngbTooltip="{{'TRANSLATE.ACCOUNT_MANAGERS_TABLE_TD_BUTTON_TOOLTIP_TEXT_VIEW_CUSTOMERS_ASSIGNED' | translate}}"
              [ngClass]="toolbarButtonHeightClass" (click)="accountmanagercustomers(data)" placement="top">
              <span class="svg-icon svg-icon-primary svg-icon-sm  h-20px w-20px">
                <i class="ki-outline ki-burger-menu-2 text-primary"></i>
              </span>
            </div>
          </div>
          <div class="d-flex align-items-center">
            <div title="Delete" class="btn btn-icon btn-active-light-primary btn-lg me-1 w-auto" ngbTooltip="{{'TRANSLATE.ACCOUNT_MANAGERS_TABLE_TD_BUTTON_TOOLTIP_TEXT_DELETE' | translate}}"
              [ngClass]="toolbarButtonHeightClass" (click)="deleteAccountManager(data)" placement="top">
              <span class="svg-icon svg-icon-primary svg-icon-sm  h-20px w-20px">
                <i class="ki-outline ki-trash fs-2 text-primary"></i>
              </span>
            </div>
          </div>
      </div>
      </ng-template>
      <ng-template #nameTemplate let-data="adtData" let-row="userData">
        <app-edit-column [data]="data" [field]="row?.field" (enableEdit)="enableEditField($event)"></app-edit-column>
      </ng-template>
  
      @if (!!datatableConfig) {
      <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig" [searchFilter]="false">
      </app-c3-table>
      }
    </div>
  </div>
