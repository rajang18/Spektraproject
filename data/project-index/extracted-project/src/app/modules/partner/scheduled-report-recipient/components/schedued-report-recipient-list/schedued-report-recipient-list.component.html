<ng-template #actionHeader>
  <div class="header-actions d-flex align-items-center gap-2 gap-lg-3">
    
    <button type="button" class="btn btn-sm btn-lg btn-md btn-xs fw-semibold btn-light-primary text-nowrap" (click)="backToReports()">
      <i class="ki-outline ki-to-left fs-2">
      </i> <span translate="TRANSLATE.PARTNER_SCHEDULED_RECIPIENTS_BTN_TEXT_BACK_TO_SCHEDULED_REPORTS"></span>
    </button>
  </div>
</ng-template>
<div class="card">
    <div class="card-body pt-0 overflow-auto">

      <ng-template #actions let-data="adtData" let-emitter="captureEvents">
        <div class="d-flex justify-content-end">
         <div class="d-flex justify-content-end">
          <div class="btn btn-icon btn-active-light-primary btn-lg me-1 w-auto" ngbTooltip="{{'TRANSLATE.ACCOUNT_MANAGERS_TABLE_TD_BUTTON_TOOLTIP_TEXT_EDIT_DETAILS' | translate}}"
            [ngClass]="toolbarButtonHeightClass" (click)="editScheduledReportRecipient(data)">
            <span class="svg-icon svg-icon-primary svg-icon-sm  h-20px w-20px">
              <i class="ki-outline ki-pencil text-primary">
                  <!-- <span class="path1"></span>
                  <span class="path2"></span> -->
                </i>
              </span>
          </div>
        </div>
        <div class="d-flex justify-content-end">
          <div class="btn btn-icon btn-active-light-primary btn-lg me-1 w-auto" ngbTooltip="{{'TRANSLATE.PARTNER_CONTRACT_OFFERS_TOOLTIP_TEXT_DELETE' | translate}}"
            [ngClass]="toolbarButtonHeightClass" (click)="deleteEmail(data)">
            <span class="svg-icon svg-icon-primary svg-icon-sm  h-20px w-20px">
              <i class="ki-outline ki-trash text-primary">
                <!-- <span class="path1"></span>
                <span class="path2"></span>
                <span class="path3"></span>
                <span class="path4"></span>
                <span class="path5"></span>
                <span class="path6"></span>
                <span class="path7"></span>
                <span class="path8"></span>
                <span class="path9"></span>
                <span class="path10"></span> -->
              </i>
            </span>
          </div>
        </div>
      </div>
      </ng-template>

      <ng-template #recipients let-data="adtData">
        <div>
          <span >{{data.Recipients | slice:0:50}}</span>
          <span class="text-primary d-block" style="cursor: pointer;" *ngIf="data.Recipients.length > 50" (click)="showMore(data.Recipients)"><span translate="SCHEDULED_REPORT_RECEIPIENT_SHOW_MORE"></span><sub>&middot;&middot;&middot;</sub></span>

        </div>
      </ng-template>

      <div class="col-md-12 d-flex justify-content-end my-2 pb-1">
        <button type="button" class="btn btn-sm btn-primary remove-caret" (click)="addScheduledReportRecipient()" appBusyLoader>
          <i class="ki-duotone ki-plus fs-2"></i> <span translate="TRANSLATE.PARTNER_SCHEDULED_RECIPIENTS_BTN_TEXT_ADD_RECIPIENT"></span>
        </button>
      </div> 
     <!-- Check if datatableConfig is defined and then render the table -->
      <ng-container *ngIf="datatableConfig">
        <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig">
        </app-c3-table>
      </ng-container>

    </div>
</div>


<ng-template #showModal>
  <div class="modal-dialog m-0 modal-dialog m-0-centered">
      <div class="modal-content">
          <div class="modal-header">
              <h2 id="modal-title">
                  <span class="">{{('TRANSLATE.PARTNER_SCHEDULED_RECIPIENTS_RECIPIENTS_TABLE_HEADER_TEXT_DESC')|translate}}</span>
              </h2>
              <div class="btn btn-sm btn-icon btn-active-color-primary" (click)="closeModal()" data-bs-dismiss="modal">
                <i class="ki-duotone ki-cross fs-1"><span class="path1"></span><span class="path2"></span></i>                
              </div>
          </div>
          <div class="modal-body" id="modal-body">
            <div class="row col-md-12 text-break">
              <span>{{this.moreResipients}}</span>
            </div>
            </div>
          <div class="modal-footer ">
            <button class="btn btn-light-primary" type="button" (click)="closeModal()">
                <span translate="TRANSLATE.BUTTON_CLOSE"></span>
            </button>
        </div>
    </div>
</div>
</ng-template>
