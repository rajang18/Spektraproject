<ng-template #actionHeader [appPermission]="'GET_BUSINESS_CENTRAL_ENTITY_MAPPING_DETAILS'">
     @if (permissions.HasGetBusinessCentralEntityMappingDetails === 'Allowed') {

    <div class="header-actions d-flex align-items-center gap-1 gap-lg-1">

        <div ngbDropdown class="d-flex align-items-center" placement="bottom-right" [appPermission]="'GET_BUSINESS_CENTRAL_ENTITY_MAPPING_DETAILS'">
        <button class="btn btn-sm btn-lg btn-md btn-xs btn-light-primary remove-caret pe-2"
          ngbTooltip="{{'TRANSLATE.BUTTON_TEXT_DOWNLOAD' | translate}}" id="dropdownBasic1"
          tittle="Customer Settings" ngbDropdownToggle>
          <i class="ki-outline ki-exit-down fs-2"></i>&nbsp;{{'TRANSLATE.BUTTON_TEXT_DOWNLOAD' | translate}}
          <i class="ki-duotone ki-down ms-1"></i>
        </button>
        <div ngbDropdownMenu aria-labelledby="dropdownBasic1" 
          class="dorpdown-menu menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-title-gray-700 menu-icon-muted menu-active-bg menu-state-primary fw-semibold py-4 fs-base w-300px">
          <div class='menu-item my-0' ngbDropdownItem >
            <a class="menu-link px-3 py-2 d-flex align-items-center gap-2"
              >
              <span class="ml-2 ng-scope text-wrap"
                translate="TRANSLATE.BUSINESS_CENTRAL_DOWNLOAD_MAPPED_CUSTOMER_BUTTON_TEXT"
                (click)="onDownloadMappedCustomersCSV(false)"></span>
            </a>
          </div>
                    <div class='menu-item my-0' ngbDropdownItem >
            <a class="menu-link px-3 py-2 d-flex align-items-center gap-2" >
              <span class="ml-2 ng-scope text-wrap" translate="TRANSLATE.BUSINESS_CENTRAL_DOWNLOAD_DELETED_CUSTOMER_BUTTON_TEXT" (click)="onDownloadMappedCustomersCSV(true)"></span>
            </a>
          </div>
          <div class='menu-item my-0' ngbDropdownItem
            >
            <a class="menu-link px-3 py-2 d-flex align-items-center gap-2">
              <span class="ml-2 ng-scope text-wrap"
                translate="TRANSLATE.BUSINESS_CENTRAL_DOWNLOAD_UNMAPPED_CUSTOMER_BUTTON_TEXT"
                (click)="onDownloadCSVHelper()"></span>
            </a>
          </div>
        </div>
        </div>

        <a class="btn btn-sm btn-lg btn-md btn-xs text-nowrap fw-bold btn-secondary"
            ngbTooltip="{{'TRANSLATE.BTN_TEXT_SHOW_FILTERS' | translate}}" (click)="displayFilter()">
            <i class="ki-outline ki-filter fs-2"></i>&nbsp;<span translate="TRANSLATE.BTN_TEXT_FILTER"></span>
        </a>
        <button type="button" class="btn btn-sm fw-bold btn-light-primary" (click)="addCustomerMappingData(null,'add')" [appPermission]="'ADD_BUSINESS_CENTRAL_ENTITY_MAPPING'"
            appBusyLoader ngbTooltip="{{'TRANSLATE.BUSINESS_CENTRAL_NEW_ENTITY_MAPPING_TOOLTIP_TEXT' | translate}}">
            <i class="ki-outline ki-plus fs-2"></i>{{'TRANSLATE.BUSINESS_CENTRAL_ADD_ENTITY_MAPPING_BUTTON_TEXT' | translate}}
        </button>
    </div>
}
</ng-template>
<div class="card">
    <div class="card-body overflow-auto">
        @if (permissions.HasGetBusinessCentralEntityMappingDetails === 'Allowed') {
            
            @if (shouldShowFilter) {
            <div class="mb-5">
                <form class="form">
                    <div class="card">
                        <div class="card-body">
                            <div class="form-group row mb-5">
                                <div class="col-md-3">
                                    <label class="text-gray-800 fw-bold mb-1">
                                        {{'TRANSLATE.CUSTOMER_MAPPING_DYNAMICS_365_BUSINESS_CENTRAL_C3_CUSTOMER_ID_LABEL_TEXT' | translate}}
                                    </label>
                                    <input type="text" name="C3ID" [(ngModel)]="C3ID"
                                        class="form-control form-control-sm input-sm"
                                        placeholder="{{'TRANSLATE.PLACEHOLDER_TEXT_DYNAMICS_365_BUSINESS_CENTRAL_C3_CUSTOMER_ID_LABEL_TEXT' | translate}}" >
                                </div>
                                <div class="col-md-3">
                                    <label class="text-gray-800 fw-bold mb-1">
                                        {{'TRANSLATE.CUSTOMER_MAPPING_DYNAMICS_365_BUSINESS_CENTRAL_COMPANY_ID_LABEL_TEXT' | translate}}
                                    </label>
                                    <input type="text" name="comapnyId" [(ngModel)]="comapnyId"
                                        class="form-control form-control-sm"
                                        placeholder="{{'TRANSLATE.PLACEHOLDER_TEXT_DYNAMICS_365_BUSINESS_CENTRAL_COMPANY_ID_LABEL_TEXT' | translate}}" >
                                </div>
                                <div class="col-md-3">
                                    <label class="text-gray-800 fw-bold mb-1">
                                        {{'TRANSLATE.CUSTOMER_MAPPING_DYNAMICS_365_BUSINESS_CENTRAL_CUSTOMER_ID_LABEL_TEXT' | translate}}
                                    </label>
                                    <input type="text" name="customerId" [(ngModel)]="customerId"
                                        class="form-control form-control-sm"
                                        placeholder="{{'TRANSLATE.PLACEHOLDER_TEXT_DYNAMICS_365_BUSINESS_CENTRAL_CUSTOMER_ID_LABEL_TEXT' | translate}}" >
                                </div>

                                <div class="mt-6">
                                    <label class="form-check form-check-inline">
                                        <input class="checkbox form-check-input" type="checkbox" [(ngModel)]="isActive" name="isActive" />
                                        <span></span>
                                        <span class="text-gray-800 fw-bold">&nbsp;
                                            {{'TRANSLATE.CUSTOMER_SEARCH_CONSIDER_DELETED_CUSTOMER'|translate}}</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="card-footer">
                            <div class="text-end">
                                <button class="btn btn-light-primary btn-sm me-2"
                                    (click)="searchCustomers()" appBusyLoader>
                                    {{'TRANSLATE.BUTTON_TEXT_SEARCH' | translate}}
                                </button>
                                <button class="btn btn-light-primary btn-sm me-2"
                                    (click)="resetSearchCriteria()" appBusyLoader>
                                    {{'TRANSLATE.BUTTON_TEXT_RESET' | translate}}
                                </button>
                                <button class="btn btn-light-primary btn-sm"
                                    (click)="shouldShowFilter = false;" appBusyLoader>
                                    {{'TRANSLATE.BUSINESS_CENTRAL_CLOSE_OPTION_TEXT' | translate}}
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            }

            <ng-template #actions let-data="adtData" let-emitter="captureEvents">
                <div class="d-flex justify-content-center align-items-center h-100" *ngIf="data.IsActive !== false && data.IsActive !== 0" [appPermission]="'REMOVE_BUSINESS_CENTRAL_ENTITY_MAPPING'">
                    <div class="btn btn-icon btn-active-light-primary btn-lg me-1 w-auto"
                        (click)="deleteMappedCustomer(data)"
                        ngbTooltip="{{'TRANSLATE.DYNAMICS_365_BUSINESS_CENTRAL_REMOVE_MAPPING_TOOLTIP_TEXT' | translate}}"
                        [ngClass]="toolbarButtonHeightClass" placement="top">
                        <i class="ki-outline ki-trash fs-2 text-primary"></i>
                    </div>
                </div>
            </ng-template>

            @if (!!datatableConfig) {
            <app-c3-table [C3searchtext]="searchbyname"
                [reload]="reloadEvent"
                [datatableConfig]="datatableConfig"
                (captureEvents)="onCaptureEvent($event)">
            </app-c3-table>
            }

        } @else {
            <div class="p-5">
                <p class="text-danger fw-bold" translate="TRANSLATE.INSTRUCTION_PC_INTEGRATION_REFRESH_BUTTON_NO_PERMISSION"></p>
            </div>
        }
        
    </div>
</div>
