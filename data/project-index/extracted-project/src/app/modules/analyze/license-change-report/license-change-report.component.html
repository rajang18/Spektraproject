<ng-template #actionHeader>
  <div class="header-actions d-flex align-items-center gap-2 gap-lg-3">
    <ng-select [(ngModel)]="selectedCustomer" name="selectedCustomer" class="ms-auto bg-white ajustar"
      (change)="onSelectedCustomerChange()" ngbTooltip="{{'TRANSLATE.REPORT_ALL_CUSTOMERS_PLACEHOLDER' |translate}}"
      placeholder="{{'TRANSLATE.REPORT_ALL_CUSTOMERS_PLACEHOLDER' |translate}}">
      @for(customer of customers; track $index){
      <ng-option [value]="customer">
        {{customer.Name}}
      </ng-option>
      }
    </ng-select>
    <div class="input-group w-25">
      <input class="form-control form-control-sm mb-3 mb-lg-0 ms-auto custom"
        [placeholder]="startDate ? startDate |c3Date" [(ngModel)]="startDate" ngbDatepicker #sd="ngbDatepicker"
        [readOnly]="true"
        (dateSelect)="convertNgbDateToJsDate()" readonly />
      <button class="btn btn-default btn-sm" (click)="sd.toggle()" type="button">
        <em class="fa fa-calendar"></em>
      </button>
    </div>
    <div class="input-group w-25">
      <input class="form-control form-control-sm mb-3 mb-lg-0 ms-auto custom"
        [placeholder]="endDate ? endDate : |c3Date" name="endDate" [(ngModel)]="endDate" ngbDatepicker
        [readOnly]="true"
        #sd="ngbDatepicker" (dateSelect)="convertNgbDateToJsDate()" readonly />
      <button class="btn btn-default btn-sm" (click)="sd.toggle()" type="button">
        <em class="fa fa-calendar"></em>
      </button>
    </div>
    <a class="btn btn-sm fw-bold btn-primary" (click)="exportLicenseChangeReport()"
      [appPermission]="'DOWNLOAD_LICENSE_CHANGE'"
      ngbTooltip="{{'TRANSLATE.LICENSE_CHANGE_CAPTION_TEXT_DOWNLOALICENSE_CHANGE_REPORT' | translate}}"
      tooltip-placement="left">
      <i class="fa fa-download"></i>
    </a>
  </div>
</ng-template>
<ng-template #productName let-data="adtData" let-emitter="captureEvents">
  @if(data.ProductForTrial != null && data.ProductForTrial != undefined && data.ProductForTrial != ''){
  {{data.ProductName}}&nbsp;<sup class="text-warning"><span
      [translate]="'TRANSLATE.PLAN_MANAGE_TRAIL_OFFER_SYMBOL_TRAIL_OFFER'"></span></sup>
  }@else{
  {{data.ProductName}}
  }
</ng-template>
<div class="card">
  <div class="card-body pt-0 overflow-auto">
    <!-- Enable name field -->
    <!-- Check if datatableConfig is defined and then render the table -->
    <ng-container *ngIf="datatableConfig" [appPermission]="'VIEW_LICENSE_CHANGE'">
      <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig" [searchFilter]=false>
      </app-c3-table>
    </ng-container>
  </div>
</div>
