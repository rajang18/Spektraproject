<div class="card card-custom">
    <!-- begin::Header -->
    <div class="card-header card-header-stretch overflow-auto">
      <ul class="nav nav-stretch nav-line-tabs fw-bold border-transparent flex-nowrap" role="tablist">
        <li class="nav-item">
          <a
            routerLink="simplereport"
            routerLinkActive="active"
            class="nav-link cursor-pointer"
            routerLinkActive="text-primary active" [routerLinkActiveOptions]="{ exact: true }"
            role="tab" (click)="setActiveTab(tabs.Reports)"
          >
            {{'TRANSLATE.COMMISSION_REPORTS_TAB_NAME_COMMISSION_REPORT'| translate}}
          </a>
        </li>
        <li class="nav-item">
          <a
            routerLink="earningsreport"
            routerLinkActive="active"
            class="nav-link cursor-pointer"
            routerLinkActive="text-primary active" [routerLinkActiveOptions]="{ exact: true }"
            role="tab" (click)="setActiveTab(tabs.Reports)"
          >
          {{'TRANSLATE.COMMISSION_REPORTS_TAB_NAME_EARNINGS_REPORT'| translate}}
        </a>
        </li>
      </ul>
    </div>
    <div class="card-body pb-0 mb-0">
      <router-outlet></router-outlet>
    </div>
  </div>
