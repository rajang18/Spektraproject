@if(!cc.IsTenantConfiguration && data.IsShowOnScreen){
<div class="form-group mb-1 row mt-6" [formGroup]="form">
    <label class="col-4 col-form-label" [ngClass]="{'': data.IsRequired}">
        <span>{{'TRANSLATE.'+ data.DisplayName |translate}}</span>
        <span class="text-danger" *ngIf="data.IsRequired">*</span>
        <i class="ki-duotone ki-information-2 fs-8 ms-1 bottom-10" ngbTooltip="{{'TRANSLATE.'+data.Description | translate }}">
            <span class="path1"></span>
            <span class="path2"></span>
            <span class="path3"></span>
        </i>
    </label>
    <div class="col-6">
        <input type="text" [disabled]="!data.IsManagedByPartner" class="form-control form-control-sm" [ngClass]="{'input-disable': !data.IsManagedByPartner}" #text (input)="onChange(text.value)" [value]="data.Value"
               [formControlName]="frmControlName">
        <span class="help-block text-muted"> <span translate="TRANSLATE.SETTINGS_PASSWORD_HELP_TEXT"></span></span>

        <!-- <div *ngIf="isInvalid" class="text-danger">This field is required</div> -->
        <!-- @if(form.get(data.Name)?.touched && form.get(data.Name)?.errors?.required){
        <span class="text-danger" translate="TRANSLATE.VALIDATION_MESSAGE_REQUIRED"></span>
        } -->
    </div>
</div>

}
