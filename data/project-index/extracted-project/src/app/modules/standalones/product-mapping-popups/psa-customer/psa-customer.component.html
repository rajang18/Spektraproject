<div class="modal-dialog m-auto w-100">
    <div class="modal-content">
        <div class="modal-header">
            <h4 class="modal-title">{{'TRANSLATE.PSA_PRODUCT_MAPPING_SELECT_EXTERNAL_CUSTOMER' |
                translate}}</h4>
        </div>
        <div class="modal-body" id="modal-body">

            <ng-template #radioButton let-data="adtData" let-emitter="captureEvents">
                <div class="mr-2">
                    <input type="radio" name="radio" (click)="updateSelectedList(data)">
                    <span>
                        {{data.Name}}
                    </span>
                    <!-- <input type="radio" [(ngModel)]="data.IsSelected" [value]="true" name="radio" (change)="updateSelectedList(data)" required> -->
                </div>
            </ng-template>
            <div class="col-md-10 mb-0 pb-0">
                <input class="form-control" [(ngModel)]="name" (ngModelChange)="onNameChange()"   type="text" name="radio">

            </div>
            <ng-container *ngIf="activeEntitiesDatatableConfig">
                <app-c3-table [datatableConfig]="activeEntitiesDatatableConfig" [reload]="reloadEvent" [searchFilter]=false>
                </app-c3-table>
            </ng-container>
        </div>
        <div class="modal-footer ">
            <button type="button" class="btn btn-light btn-active-light-primary" data-bs-dismiss="modal"
                (click)="closeModalPopup()">{{'TRANSLATE.BUTTON_TEXT_CANCEL' | translate}}</button>
            <button type="button" class="btn btn-outline-primary" data-bs-dismiss="modal"
                (click)="Submit()">{{'TRANSLATE.BUTTON_TEXT_SUBMIT' | translate}}</button>
        </div>
    </div>
</div>
