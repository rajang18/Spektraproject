<div class="card card-custom  d-flex">
    <div class="card-header pt-5 pb-5 h-min-50px">
        <div class="card-title align-items-start flex-column dashboard-tile-title">
            <span class="card-label fw-semibold"><span
                    translate="TRANSLATE.CUSTOMER_PROFILE_PARTNR_HEADER_TEXT_ADDRESSES"></span>
            </span>
        </div>
        @if(!!isEditable){
        <div class="d-flex justify-content-end">
            <button class="btn btn-sm btn-primary" (click)="addAddresses()" [appPermission]="'ADD_CUSTOMER_ADDRESS'"
                appBusyLoader>
                <i class="ki-outline ki-plus fs-2"></i>
                <!-- <img alt="Logo" src="../../../../../../assets/svg-icons/plus-svg.svg"
                class="h-10px h-lg-10px pe-1" /> -->
                <span translate="TRANSLATE.CUSTOMER_PROFILE_PARTNR_BUTTON_TEXT_ADD_ADDRESSES"></span>
            </button>
        </div>
        }
    </div>
    <div class="card-body overflow-scroll">
        @if (!!datatableConfig) {
        <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig">
        </app-c3-table>
        }
    </div>
</div>

<ng-template #actions let-data="adtData" let-emitter="captureEvents">
    <div class="d-flex justify-content-end">
        @if(!!isEditable && !!isEdit){
        @if (!data?.IsDefault){
        <div class="">
            <div ngbTooltip="{{'TRANSLATE.PROFILE_USER_BUTTON_TOOLTIP_TEXT_MAKE_DEFAULT' | translate}}"
                class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto" [ngClass]="toolbarButtonHeightClass"
                (click)="makeAsAddressDefault(data)" [appPermission]="'EDIT_CUSTOMER_ADDRESS'">
                <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg  h-20px w-20px">
                    <i class="ki-outline ki-check-circle text-primary">
                        <!-- <span class="path1"></span>
                            <span class="path2"></span> -->
                    </i>
                </span>
            </div>
        </div>
        }

        <div class="d-flex align-items-center">
            <div ngbTooltip="{{'TRANSLATE.PROFILE_USER_BUTTON_TOOLTIP_TEXT_EDIT' | translate}}"
                class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto" [ngClass]="toolbarButtonHeightClass"
                (click)="editTableRow(data)" [appPermission]="'EDIT_CUSTOMER_ADDRESS'">
                <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg  h-20px w-20px">
                    <i class="ki-outline ki-pencil text-primary">
                        <!-- <span class="path1"></span>
                            <span class="path2"></span> -->
                    </i>
                </span>
            </div>
        </div>
        <div class="d-flex align-items-center">
            <div ngbTooltip="{{'TRANSLATE.PROFILE_USER_BUTTON_TOOLTIP_TEXT_DELETE' | translate}}"
                class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto" [ngClass]="toolbarButtonHeightClass"
                (click)="deleteTableRow(data)" [appPermission]="'DELETE_CUSTOMER_ADDRESS'">
                <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg  h-20px w-20px">
                    <i class="ki-outline ki-trash text-primary">
                        <!-- <span class="path1"></span>
                            <span class="path2"></span>
                            <span class="path3"></span>
                            <span class="path4"></span>
                            <span class="path5"></span> -->
                    </i>
                </span>
            </div>
        </div>
        }



    </div>
</ng-template>


<ng-template #contactType let-data="adtData" let-emitter="captureEvents">
    <div class="d-flex align-items-center">
        @if (!data?.IsDefault){
        <span class="fw-semibold">{{data.ContactTypeDescription | translate}}</span>
        }
        @else {
        <span class="fw-semibold">{{data.ContactTypeDescription|translate}}</span>
        <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg h-20px w-20px">
            <i class="ki-outline ki-check-circle text-success">
                <!-- <span class="path1"></span>
                <span class="path2"></span> -->
            </i>
        </span>
        }
    </div>
</ng-template>
