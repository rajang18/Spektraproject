<ng-template #actionHeader>
  <div class="header-actions d-flex align-items-center gap-2 gap-lg-3">
    <button type="button" class="btn btn-sm fw-bold btn-primary" (click)="addBannerNotifications()" appBusyLoader>
      <i class="ki-duotone ki-plus fs-2"></i><span translate="TRANSLATE.NOTIFICATION_BUTTON_TO_CREATE_NEW_NOTIFICATION"></span>
    </button>
  </div>
</ng-template>
<div class="card">
    <div class="card-body overflow-auto">
        <ng-template #actions let-data="adtData" let-emitter="captureEvents">
            <div class="d-flex justify-content-end">
             <div class="">
              <div class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto" ngbTooltip="{{'TRANSLATE.BUTTON_TEXT_EDIT' | translate}}"
                [ngClass]="toolbarButtonHeightClass" (click)="editDetails(data)">
                <span class="svg-icon svg-icon-primary svg-icon-sm  h-20px w-20px">
                  <i class="ki-outline ki-pencil fs-3 text-primary">
                      <!-- <span class="path1"></span>
                      <span class="path2"></span> -->
                    </i>
                  </span>
              </div>
            </div>

            
            <div class="">
              <div class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto" ngbTooltip="{{'TRANSLATE.BUTTON_TEXT_DELETE' | translate}}"
                [ngClass]="toolbarButtonHeightClass" (click)="deleteWebNotificationMessage(data)">
                <span class="svg-icon svg-icon-primary svg-icon-sm  h-20px w-20px">
                  <i class="ki-outline ki-trash fs-2 text-primary">
                    <!-- <span class="path1"></span>
                    <span class="path2"></span>
                    <span class="path3"></span>
                    <span class="path4"></span>
                    <span class="path5"></span>
                    <span class="path6"></span>
                    <span class="path7"></span>
                    <span class="path8"></span>
                    <span class="path9"></span>
                    <span class="path10"></span> -->
                </i>
                </span>
              </div>
            </div>
          </div>
        </ng-template>
          <ng-template #message let-data="adtData" let-emitter="captureEvents">
            <div> 
              <span [innerHTML]="getInnerHTMLContent(data)">
                <!-- {{'TRANSLATE.' + data?.MessageBody | translate}} -->
              </span>
            </div>
            </ng-template>

            <ng-template #entityList let-data="adtData" let-emitter="captureEvents">
              <div>
                <span class="col-md-1 text-primary cursor-pointer" >
                  <a (click)="viewNameList(data)">
                    {{data?.NamesList.split(',').length}}
                  </a>
                </span>
              </div>
              </ng-template>
          @if (!!datatableConfig) {
            <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig">
            </app-c3-table>
            }
    </div>
</div>
