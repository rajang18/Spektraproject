<ng-template #actionHeader>
    <button type="button" class="btn btn-light-primary btn-sm fw-semibold me-2" busy="" busy-add-classes="disabled"
        not-busy-remove-classes="disabled" (click)="backToCustomers()">
        <i class="ki-outline ki-to-left fs-2"></i>
        {{'TRANSLATE.PARTNER_CUSTOMER_PLANS_BTN_TEXT_BACK_TO_CUSTOMERS' | translate }}
    </button>
</ng-template>
<div class="d-flex flex-column-fluid">
    <!--begin::Container-->
    <div class="container-fluid">
        <!--begin::Card-->
        <div class="card card-custom">
            <div class="card-body">
                <div class="form-group row">
                    <div class="col-md-12">
                        <h4 class="block"><span translate="TRANSLATE.RELOAD_RECONCILIATION_STATUS"></span></h4>
                    </div>
                </div>
                <div class="form-group row">
                    <div class="col-lg-12">
                        <ul class="list-group">
                            @for (row of reloadCustomers; track $index) {
                            <li class="list-group-item">
                                <span>
                                    <span>
                                        <i class="ki-outline ki-check-circle text-success"
                                            *ngIf="row.Status === 'Success'"></i>
                                        <i class="ki-outline ki-loading text-success"
                                            *ngIf="(row.Status === undefined || row.Status === 'Queued' || row.Status === 'InProgress')"></i>
                                        <i class="ki-outline ki-information-5 text-danger"
                                            *ngIf="(row.Status === 'Error' || row.Status === 'Failed')"></i>
                                    </span>
                                    &nbsp;
                                    {{row.Name}}
                                    &nbsp;
                                    @if(row.ErrorMessage !== null && row.ErrorMessage !==''){
                                    <span class="text-danger">{{'TRANSLATE.'+row.ErrorMessage |translate}}</span>
                                    }
                                </span>
                            </li>
                            }

                        </ul>
                    </div>
                    <div class="col-lg-12">
                        <button class="btn btn-sm btn-light-primary uppercase float-end mt-2"
                            (click)="backToCustomers()"><span
                                translate="TRANSLATE.PARTNER_CUSTOMER_PLANS_BTN_TEXT_BACK_TO_CUSTOMERS"></span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
