<div *ngIf="pagemode === 'ShowQuotesPdf'">
    <div class="table-responsive">
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>
              <span translate="TRANSLATE.QUOTE_TABLE_HEADER_TEXT_NAME"></span>
            </th>
            <th>
              <span translate="TRANSLATE.QUOTE_BUTTON_TEXT_AGE"></span>
            </th>
          </tr>
        </thead>
        <tbody>
          <!-- <tr *ngFor="let row of people">
            <td>{{ row.name }}</td>
            <td>{{ row.age }}</td>
          </tr> -->
        </tbody>
      </table>
    </div>
  
    <button type="button" class="btn btn-outline-primary btn-sm me-2" (click)="ExportQuotePDF()" aria-haspopup="true" aria-expanded="false">
      <i class="fas fa-download"></i> <span translate="TRANSLATE.INVOICE_INVOICE_BUTTON_DOWNLOAD_INVOICE"></span>
    </button>
  </div>
  
  <div class="card jumbotron">
    <div class="card-body d-flex justify-content-center align-items-center">
      <div class="card w-lg-650px py-5" *ngIf="pagemode === 'notFound'">
        <div class="card-body py-15 py-lg-10">
          <h1 class="fw-bold fs-2hx text-dark mb-4 text-center">
            <span>{{ 'TRANSLATE.QUOTE_STATUS_OOPS_ERROR' |translate }}</span>
          </h1>
          <div class="fw-semibold fs-6 text-gray-500 mb-7 text-center">
            <span>{{ 'TRANSLATE.QUOTE_STATUS_WE_CANT_FIND_THAT_PAGE_ERROR' |translate }}</span>
          </div>
          <div class="mb-3 text-center">
            <img src="../../../assets/media/png/404-error.png" class="theme-light-show" style="max-width: 500px; max-height: 333px;" alt="">
          </div>
          <div class="mb-0 text-center">
            <a href="/#/home/dashboard.html" class="btn btn-sm btn-primary">Return Home</a>
          </div>
        </div>
      </div>
  
      <div *ngIf="pagemode !== 'notFound'">
        <div class="quote-preview-toolbar p-3 mb-5 rounded sc d-flex justify-content-end gap-3">
          <a id="btn-two" class="btn btn-sm fw-bold btn-primary" (click)="ExportPDF('landscape')">
            <i class="fa fa-download"></i> {{ 'TRANSLATE.QUOTE_DOWNLOAD_AS_PDF' | translate }}
          </a>
          <!--<a class="btn btn-sm fw-bold btn-primary" (click)="ExportPDF('landscape')">
            <i class="fa fa-download"></i> Download PDF as Landscape
          </a>-->
        </div>
        <div class="quote-preview-container shadow p-3 mb-5 rounded sc ps-3 pe-3" id="sample-target-for-pdf">
        </div>
      </div>
    </div>
  </div>
