    </button>
  </div>
</ng-template>

     <div class="form-group form-check d-flex justify-content-end">
        <div class="py-2">
           <label>{{'TRANSLATE.SUBCATEGORIES_CUSTOM_OFFERS_SEARCH_CONSIDER_DELETED_SUBCATEGORIES'|translate}} <br /> </label>
             <input class="form-check-input" type="checkbox" [(ngModel)]="considerDeleted" (ngModelChange)="searchCustomers()" name="considerDeleted"/>
         </div>
       </div>

    <ng-template #actions let-data="adtData" let-emitter="captureEvents">
      <div class="d-flex justify-content-end">
        <div class="d-flex align-items-center">
          <div class="btn btn-sm btn-icon btn-active-light-primary me-1 w-auto" *ngIf="data.IsActive"
           ngbTooltip="{{'TRANSLATE.SUB_CATEGORY_TABLE_TD_BUTTON_TOOLTIP_TEXT_EDIT' | translate}}"
            [appPermission]="'MANAGE_SUBCATEGORIES_LIST'" [ngClass]="toolbarButtonHeightClass"
            (click)="editSubCategoryDetails(data,'edit')">
            <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg me-md-2 h-20px w-20px">
              <i class="ki-outline ki-pencil text-primary"></i>
            </span>
          </div>
        </div>
        <div class="d-flex align-items-center">
          <div class="btn btn-sm btn-icon btn-active-light-primary me-1 w-auto" *ngIf="!data.IsActive" 
          ngbTooltip="{{'TRANSLATE.SUB_CATEGORY_TABLE_TD_BUTTON_TOOLTIP_TEXT_VIEW' | translate}}"
            [appPermission]="'MANAGE_SUBCATEGORIES_LIST'" [ngClass]="toolbarButtonHeightClass"
            (click)="editSubCategoryDetails(data,'edit')">
            <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg me-md-2 h-20px w-20px">
              <i class="ki-outline ki-eye text-primary"></i>
            </span>
          </div>
        </div>
        <div class="d-flex align-items-center">
          <div class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto" *ngIf="data.IsActive"
            ngbTooltip="{{'TRANSLATE.SUB_CATEGORY_TABLE_TD_BUTTON_TOOLTIP_TEXT_DELETE'|translate}}"
            [appPermission]="'DELETE_SUBCATEGORIES_LIST'" [ngClass]="toolbarButtonHeightClass"
            (click)="deleteSubcategory(data)">
            <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg me-md-2 h-20px w-20px">
              <i class="ki-outline ki-trash text-primary"></i>
            </span>
          </div>
        </div>
      </div>
    </ng-template>

    @if (!!datatableConfig) {
    <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig">
    </app-c3-table>
    }
  </div>

  <router-outlet></router-outlet>
</div>
