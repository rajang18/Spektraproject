<div type="text/ng-template">
    <div class="modal-header">
        <h3 class="modal-title text-primary" id="modal-title"><span class="text-primary" translate="TRANSLATE.USERS_RESETUSERPASSWORD_PASSWORD_RESET" ></span></h3>
    </div>
    <div class="modal-body padding-bottom-50" id="modal-body">
        <h6 class="modal-title"><span [innerHTML]="('TRANSLATE.USERS_RESETUSERPASSWORD_SEND_PASSWORD_1')  | translate" ></span>
            <span><a href="javascript:void(0)" (click)='confirmCopy()'><b>{{reqBody.updatedPassword}}</b></a></span>
        <span [innerHTML]="('TRANSLATE.USERS_RESETUSERPASSWORD_SEND_PASSWORD_2')  | translate" ></span></h6>

        <br />
        <div class="form-group row">
            <label class="col-md-3 control-label">
                <i class="fa fa-info-circle tooltips text-default me-2" aria-hidden="true" ngbTooltip="{{'TRANSLATE.CUSTOMR_PASSWORD_POPUP_TOOLTIP_EMAIL_RECEPIENTS'|translate}}"></i>
                <span translate="TRANSLATE.CUSTOMR_PASSWORD_POPUP_EMAIL_RECEPIENTS" ></span>
            </label>
            <div class="col-md-8">
                <textarea class="form-control" name="recipients" rows="3" cols="60" [(ngModel)]="reqBody.suggestedRecipients"></textarea>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <a class="btn btn-secondary btn-xs mr-2" (click)="closeModalPopup()"><span translate="TRANSLATE.BUTTON_TEXT_CANCEL" ></span></a>
        <a class="btn btn-primary btn-xs mr-2" (click)="submit()"  disabled="reqBody.suggestedRecipients == ''"><span translate="TRANSLATE.BUTTON_TEXT_OK" ></span></a>
    </div>
</div>
