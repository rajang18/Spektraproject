<div class="card card-custom  d-flex">
    <div class="card-header pt-3 pb-3" style="min-height: 0;">
        <div class="card-title align-items-start flex-column dashboard-tile-title">
            <span class="card-label fw-bold text-gray-900"><span
                    translate="TRANSLATE.CUSTOMER_PROFILE_PARTNR_HEADER_TEXT_PHONE_NUMBERS"></span>
            </span>
        </div>
        <!-- @if(!!isEditable){ -->
        <div class="d-flex justify-content-end">
            <button class="btn btn-sm btn-primary" (click)="addPhones()" [appPermission]="'ADD_SITE_PHONE'">
                <!-- <i class="ki-outline ki-plus fs-2"></i> -->
                <i class="ki-duotone ki-plus fs-2"></i>
                <span translate="TRANSLATE.CUSTOMER_PROFILE_PARTNR_BUTTON_TEXT_ADD_Phone"></span>
            </button>
        </div>
        <!-- } -->
    </div>
    <div class="card-body" [ngClass]="(!isEditable || isLoading) ? 'hide-no-data' : ''" style="overflow: auto;">
        @if (!!datatableConfig) {
        <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig" [isPaginationHide]="tableData?.length>0" [isPaginationRowHide]="tableData?.length>0">
        </app-c3-table>
        }
    </div>
</div>

<ng-template #actions let-data="adtData" let-emitter="captureEvents">
    <div class="d-flex justify-content-end">
        <div class="d-flex align-items-center">
            <div ngbTooltip="{{'TRANSLATE.PROFILE_USER_BUTTON_TOOLTIP_TEXT_EDIT' | translate}}"  class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto"
                [ngClass]="toolbarButtonHeightClass" (click)="editTableRow(data)" [appPermission]="'EDIT_SITE_PHONE'">
                <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg  h-20px w-20px">
                    <i class="ki-outline ki-pencil text-primary">
                        <!-- <span class="path1"></span>
                        <span class="path2"></span> -->
                    </i>
                </span>
            </div>
        </div>
        <div class="d-flex align-items-center">
            <div ngbTooltip="{{'TRANSLATE.PROFILE_USER_BUTTON_TOOLTIP_TEXT_DELETE' | translate}}" class="btn btn-icon btn-active-light-primary btn-sm me-1 w-auto"
                [ngClass]="toolbarButtonHeightClass" (click)="deleteTableRow(data)" [appPermission]="'DELETE_SITE_PHONE'">
                <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg  h-20px w-20px">
                    <i class="ki-outline ki-trash text-primary">
                        <!-- <span class="path1"></span>
                        <span class="path2"></span>
                        <span class="path3"></span>
                        <span class="path4"></span>
                        <span class="path5"></span> -->
                    </i>
                </span>
            </div>
        </div>

    </div>
</ng-template>


<ng-template #contactType let-data="adtData" let-emitter="captureEvents">
    <div class="d-flex align-items-center">
        @if (!data?.IsDefault){
        <span>{{data.ContactTypeDescription | translate}}</span>
        }
        @else {
        <span>{{data.ContactTypeDescription | translate}}</span>
        <span class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg h-20px w-20px">
            <i class="ki-outline  ki-check-circle text-success">
                <span class="path1"></span>
                <span class="path2"></span>
            </i>
        </span>
        }
    </div>
</ng-template>
