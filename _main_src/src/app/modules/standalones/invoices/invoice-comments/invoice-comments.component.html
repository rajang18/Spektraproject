<div class="d-flex flex-column-fluid">
    <div class="container-fluid">
        <div class=" ">
            <div class="">  
                <div class="table-responsive-md fixed-height-one">
                    <ng-container *ngIf="!!dataTableConfig">
                        <app-c3-table [reload]="reloadEvent" [datatableConfig]="dataTableConfig" [isPaginationHide]="true"></app-c3-table>
                    </ng-container>
                </div>
            </div>
            <div class="card-footer pb-0 pt-4">
                <textarea class="form-control border-0 p-0" rows="1" placeholder="{{'TRANSLATE.INVOICE_TYPE_A_COMMENT_INPUT_PLACEHOLDER_TEXT' | translate}}" required [(ngModel)]="newComment"></textarea>
                <div class="d-flex align-items-center justify-content-between mt-5">
                    <div class="me-3">
                    </div>
                    <div>
                        <a class="btn btn-primary btn-md font-weight-bold chat-send py-2 px-6" (click)="saveInvoiceComments()">{{'TRANSLATE.NEW_COMMENT_SEND' | translate}}</a>
                    </div>
                </div>
            </div>
            <!--end:comments footer-->
        </div>
    </div>
</div>


<ng-template #comments let-i="adtData">
    <div>
        <div class="message">
            <div class="d-flex flex-column mb-5" [ngClass]="{'align-items-start':i.IsAuthor=== true,'align-items-end': i.IsAuthor === false}">
                <div class="d-flex align-items-center" *ngIf="i.IsAuthor=== true">
                    <div class="symbol  symbol-circle symbol-light-primary me-3">
                        <span class="symbol-label font-size-h5 bg-light-primary text-primary fw-semibold me-2"> {{i.CreateBy | formatforinitials}} </span>
                    </div>
                    <div>
                        <a  class="ms-2 text-dark fw-bold fs-6 text-decoration-none link-primary font-size-h6">
                            <span>{{i.CreateBy}}</span>
                        </a>
                        <span class=" ps-1 text-muted font-size-sm">{{i.CreateDate | dateTimeFilter : globalDateFormat}}</span>
                        <span class="badge badge-pill badge-primary ms-1"
                        translate="TRANSLATE.COMMENT_AUTHOR"></span>
                    </div>
                </div>
                <div class="d-flex align-items-center" *ngIf="i.IsAuthor=== false">
                    <div>
                        <span class="text-muted font-size-sm ">{{i.CreateDate | dateTimeFilter : globalDateFormat}}</span>
                        <a  class="ms-2 text-dark fw-bold fs-6 text-decoration-none link-primary font-size-h6">{{i.CreateBy}}</a>
                    </div>&nbsp;
                    <div class="symbol symbol-circle symbol-light-primary ">
                        <span class="symbol-label font-size-h5 bg-light-primary text-primary fw-semibold me-2"> {{i.CreateBy | formatforinitials}} </span>
                    </div>
                </div>
                <div class="mt-2 rounded p-5  text-dark-50 font-weight-bold font-size-lg text-left max-w-400px me-2" [ngClass]="{'bg-light-success':i.IsAuthor=== true,'bg-light-info': i.IsAuthor === false}">
                    {{i.Content}}
                </div>
            </div>
        </div>
    </div>
</ng-template>
