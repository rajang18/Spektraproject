<div class="modal-dialog modal-dialog-centered modal-lg m-0">
    <div class="modal-content">
        <div class="modal-header flex-column align-items-start">
            <h2 id="modal-title" class="mb-2">
                <span translate="TRANSLATE.PROFILE_PAYMENTS_VALIDATE_PAYMENT_PROFILE_POPUP_MODAL_HEADER"></span>
            </h2>

            <p class="text-muted fs-6 mb-0" *ngIf="!verificationUrl"
                translate="TRANSLATE.STRIPE_VERIFY_BANK_ACCOUNT_DEPOSITS">
            </p>

            <p class="text-muted fs-6 mb-0" *ngIf="verificationUrl"
                translate="TRANSLATE.STRIPE_VERIFY_BANK_ACCOUNT_DEPOSITS_INFO">
            </p>
            <div class="btn btn-sm btn-icon btn-active-color-primary position-absolute end-0 top-0 m-3"
                (click)="closeModalPopup()" data-bs-dismiss="modal">
                <i class="ki-duotone ki-cross fs-1">
                    <span class="path1"></span>
                    <span class="path2"></span>
                </i>
            </div>

        </div>

    <div class="modal-body position-relative" style="height:600px" *ngIf="verificationUrl">
        <div *ngIf="!iframeLoaded"
            class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-white"
            style="z-index: 10;">
            <div class="text-center">
                <span class="spinner-border text-primary" role="status">
                </span>
                <p class="mt-3 text-muted fs-6">
                    {{'TRANSLATE.LOADING_VERIFICATION' | translate}}</p>
            </div>
        </div>
        <iframe #verifyIframe [src]="safeUrl" width="100%" height="100%" frameborder="0"
            [style.visibility]="iframeLoaded ? 'visible' : 'hidden'" (load)="onIframeLoad(verifyIframe)">
        </iframe>
    </div>

        <form role="form" class="form" [formGroup]="testAmount" *ngIf="!verificationUrl">

            <div class="modal-body">

                <div class="form-group">
                    <label class="required fw-semibold fs-6 mb-2"
                        translate="TRANSLATE.PROFILE_PAYMENTS_VALIDATE_PAYMENT_PROFILE_POPUP_TEXT_AMOUNT_1"></label>

                    <input class="form-control form-control-sm w-50" maxlength="2" formControlName="achOne"
                        autocomplete="off"
                        placeholder="{{'TRANSLATE.PROFILE_PAYMENTS_VALIDATE_PAYMENT_PROFILE_POPUP_PLACEHOLDER_TEXT_AMOUNT_1' | translate}}">
                </div>

                <div class="form-group mt-7">
                    <label class="required fw-semibold fs-6 mb-2"
                        translate="TRANSLATE.PROFILE_PAYMENTS_VALIDATE_PAYMENT_PROFILE_POPUP_TEXT_AMOUNT_2"></label>

                    <input class="form-control form-control-sm w-50" maxlength="2" formControlName="achTwo"
                        autocomplete="off"
                        placeholder="{{'TRANSLATE.PROFILE_PAYMENTS_VALIDATE_PAYMENT_PROFILE_POPUP_PLACEHOLDER_TEXT_AMOUNT_2' | translate}}">
                </div>
            </div>
        </form>

        <div class="modal-footer">
            <button class="btn btn-sm btn-light-primary me-2" (click)="closeModalPopup()">
                {{'TRANSLATE.BUTTON_TEXT_CLOSE' | translate}}
            </button>
        <button *ngIf="!verificationUrl" type="button" class="btn btn-sm btn-primary" [disabled]="isSubmitting" (click)="validateBankAccount($event)">
            {{'TRANSLATE.BUTTON_TEXT_SUBMIT' | translate}}
        </button>
        </div>
        </div>
