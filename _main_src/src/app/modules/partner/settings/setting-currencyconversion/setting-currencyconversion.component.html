
<ng-template #actionHeader >
    <div class="header-actions d-flex align-items-center gap-2 gap-lg-3">
        <button type="button" (mouseenter)="tooltip.open()" (mouseleave)="tooltip.close()"
            class="btn btn-sm fw-bold btn-secondary me-2"
            ngbTooltip="{{'TRANSLATE.BTN_TEXT_SHOW_FILTERS' | translate}}" (click)="toggleFilters()"
            #tooltip="ngbTooltip">
            <i class="ki-outline ki-filter fs-2"></i>&nbsp;<span translate="TRANSLATE.BTN_TEXT_FILTER"></span>
        </button>
        <button type="button" class="btn btn-sm fw-bold btn-primary"
            [routerLink]="['/partner/settings/currencyconversion/addoreditcurrencyconversion']"
            [appPermission]="'BTN_SAVE_CURRENCY_CONVERSION'" appBusyLoader>
            <i class="ki-outline ki-plus fs-2"></i>{{'TRANSLATE.BUTTON_TEXT_ADD_CURRENCY_CONVERSION'|translate}}
        </button>
    </div>
</ng-template>

    <div class="card-body pt-0 overflow-auto">
        <ng-template #effectiveFrom let-data="adtData" let-emitter="captureEvents">
            <div>
                {{data.EffectiveFrom | c3Date}}
            </div>
        </ng-template>
        <ng-template #actions let-data="adtData" let-emitter="captureEvents">
            <div class="d-flex justify-content-end">
                <!-- Add your action buttons or other elements here -->
                <div class="d-flex align-items-end" *ngIf="currentDate < data.EffectiveFrom">
                    <div ngbTooltip="{{'TRANSLATE.CUSTOMER_TAGS_TABLE_BUTTON_TOOLTIP_DELETE'|translate}}"
                        class="btn btn-icon btn-active-light-primary btn-lg me-1 w-auto text-center"
                        [ngClass]="toolbarButtonHeightClass" (click)="deteteCurrencyConversion(data)"
                        [appPermission]="'BTN_DELETE_CURRENCY_CONVERSION'">
                        <span
                            class="svg-icon svg-icon-primary svg-icon-xl svg-icon-sm svg-icon-lg me-md-2 h-20px w-20px">
                            <i class="ki-outline ki-trash text-primary"> </i>
                        </span>
                    </div>
                </div>

                <div class="d-flex align-items-end">
                    <div ngbTooltip="{{'TRANSLATE.CURRENCY_CONVERSION_BUTTON_TEXT_CLONE_CONVERSION'|translate}}"
                        class="btn btn-icon btn-active-light-primary btn-lg me-1 w-auto text-center"
                        [ngClass]="toolbarButtonHeightClass" (click)="cloneCurrencyConversion(data)">
                        <span>
                            <i class="ki-outline ki-copy text-primary"></i>
                        </span>
                    </div>
                </div>
            </div>
        </ng-template>

        <form class="form" *ngIf="filtersExpanded">
            <div class="card card-custom mt-5 mb-3">
                <div class="card-body">
                    <div class="form-group row">
                        <div class="col-6 col-sm-6 col-md-4 col-lg-4 pb-5">
                            <label class="fw-semibold mb-2">
                                {{'TRANSLATE.CURRENCY_CONVERSION_LABEL_TEXT_SOURCE_CURRENCY'|translate}}
                            </label>
                            <ng-select [(ngModel)]="sourceCurrency" name="sourceCurrency"
                                (change)="getTargetCurrencyList()"
                                placeholder="{{'TRANSLATE.FILTER_SELECT_A_SOURCE_CURRENCY' |translate}}">
                                <ng-option *ngFor="let item of currencyData"
                                    [value]="item.CurrencyCode">{{item.CurrencyCode}}</ng-option>
                            </ng-select>
                        </div>
                        <div class="col-6 col-sm-6 col-md-4 col-lg-4">
                            <label class="fw-semibold mb-2">
                                {{'TRANSLATE.CURRENCY_CONVERSION_LABEL_TEXT_TARGET_CURRENCY'|translate}}
                            </label>
                            <ng-select [(ngModel)]="targetCurrency" name="targetCurrency"
                                placeholder="{{'TRANSLATE.FILTER_SELECT_A_TARGET_CURRENCY' |translate}}">
                                <ng-option *ngFor="let item of filteredCurrencyList"
                                    [value]="item.CurrencyCode">{{item.CurrencyCode}}</ng-option>
                            </ng-select>
                        </div>
                        <div class="col-6 col-sm-6 col-md-4 col-lg-4">
                            <label class="fw-semibold mb-2">
                                {{'TRANSLATE.CURRENCY_CONVERSION_LABEL_TEXT_TIME_PERIOD'|translate}}
                            </label>
                            <select name="timePeriod" class="form-select form-select-sm" [(ngModel)]="timePeriod">
                                <option [value]="null">
                                    {{'TRANSLATE.CURRENCY_CONVERSION_LABEL_DEFAULT'|translate}}
                                </option>
                                <option value="LAST_BILLING_MONTH">
                                    {{'TRANSLATE.CURRENCY_CONVERSION_LABEL_LAST_BILLING_MONTH'|translate}}
                                </option>
                                <option value="CURRENT_BILLING_MONTH">
                                    {{'TRANSLATE.CURRENCY_CONVERSION_LABEL_CURRENT_BILLING_MONTH'|translate}}
                                </option>
                                <option value="NEXT_BILLING_MONTH">
                                    {{'TRANSLATE.CURRENCY_CONVERSION_LABEL_NEXT_BILLING_MONTH'|translate}}
                                </option>
                                <option value="PICK_A_DATE">
                                    {{'TRANSLATE.CURRENCY_CONVERSION_LABEL_PICK_A_DATE'|translate}}
                                </option>
                            </select>
                        </div>
                        @if(timePeriod == 'PICK_A_DATE'){
                        <div class="col-6 col-sm-6 col-md-4 col-lg-4">
                            <div class="input-group mt-8">
                                <input class="form-control form-control-sm" [(ngModel)]="effectiveFromWithOffset"
                                    (ngModelChange)="updateDate($event)"
                                    [readOnly]="true"
                                    [placeholder]="effectiveFromWithOffset ? (effectiveFromWithOffset | c3Date) : ('TRANSLATE.CLONE_CURRENCY_PLACEHOLDER_TEXT_PLEASE_SELECT_A_DATE'| translate)"
                                    name="effectiveFromWithOffset" ngbDatepicker #sd="ngbDatepicker" readonly />
                                <button class="btn btn-light-primary btn-sm" (click)="sd.toggle()" type="button">
                                    <i class="ki-outline ki-calendar fs-3"></i>
                                </button>
                            </div>
                        </div>
                        }
                        <div class="card-footer py-3 pb-0">
                            <div class="row">
                                <div class="col-sm-12 col-md-12 col-xs-12 col-12 col-lg-12 text-lg-end mt-4">
                                    <button
                                        class="btn btn-light-primary btn-sm  me-md-2 me-lg-2 me-sm-2 me-xl-2 me-xxl-2"
                                        (click)="searchCurrencyConversionList()" appBusyLoader>
                                        {{'TRANSLATE.CUSTOMER_SEARCH_SEARCH_OPTION' | translate}}
                                    </button>
                                    <button
                                        class="btn btn-light-primary btn-sm  me-md-2 me-lg-2 me-sm-2 me-xl-2 me-xxl-2"
                                        (click)="resetSearchCriteria()" appBusyLoader>
                                        {{'TRANSLATE.CUSTOMER_SEARCH_RESET_OPTION' | translate}}</button>
                                    <button class="btn btn-light-primary btn-sm"
                                        (click)="filtersExpanded = false;">{{'TRANSLATE.CUSTOMER_SEARCH_CLOSE_OPTION' | translate}}</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>

        <!-- Check if datatableConfig is defined and then render the table -->
        <ng-container *ngIf="datatableConfig">
            <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig" [searchFilter]="false">
            </app-c3-table>
        </ng-container>
    </div>
