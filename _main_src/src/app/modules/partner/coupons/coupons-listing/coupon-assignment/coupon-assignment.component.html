
<ng-template #actionHeader>
  <div class="header-actions d-flex align-items-center gap-1 gap-lg-1">
    <div ngbDropdown autoClose="outside" class="d-flex align-items-center">
      <button class="btn btn-outline-primary btn-sm mr-5 btn-light-primary" type="button" id="statusDropdownButton"
        data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" ngbDropdownToggle>
        <span translate="TRANSLATE.QUOTE_STATUS"></span>
      </button>
      <div ngbDropdownMenu aria-labelledby="statusDropdownButton">
        <div class="row">
          <div class="col ml-5">
            @for (status of getCouponStatuses(); track $index) {
              <div class='menu-item my-0 mt-3'>
                <label  class="form-check form-check-inline ms-3"   ng-init="status.selected = vm.allSelected" role="button">
                  <input type="checkbox" class="form-check-input" (click)="UpdateSelectedStatus(status[1],$event)"
                    [checked]="checkedSelectedCouponList(status[1])" role="button">
                  <span></span> {{'TRANSLATE.'+status[1] | translate}}
                </label>
              </div>
            }
          </div>
        </div><span></span><br />
      </div>
    </div>
    <div class="d-flex align-items-center">
      <button type="button" class="btn btn-primary btn-sm remove-caret ms-2" [routerLink]="['/partner/coupon/addcouponassignment']" [appPermission]="'BTN_SAVE_COUPON_ASSIGNMENT'" appBusyLoader>
        <i class="ki-duotone ki-plus fs-2"></i>
        {{'TRANSLATE.COUPON_ASSIGNMENTS_BUTTON_LABEL_ADD_NEW_COUPON_ASSIGNMENT' | translate}}
      </button>
    </div>
  </div>
</ng-template>

  <ng-template #actions let-data="adtData" let-emitter="captureEvents">

          <span class="svg-icon svg-icon-primary svg-icon-sm  h-20px w-20px">
            <i class="ki-outline ki-cross fs-1 text-primary">
            </i>
          </span>
           </button>
      </div>
    </div>

  <ng-template #status let-data="adtData" let-emitter="captureEvents">
    <span>
      <span class="p-2 mb-2 badge badge-light-danger" *ngIf="data.IsActive === false" style="position:absolute;"
        translate="TRANSLATE.COUPON_ASSIGNMENTS_BADGE_COUPON_ASSIGNMENT_IS_INACTIVE"></span>
      <span class="p-2 mb-2 badge badge-light-success" *ngIf="data.IsActive === true" style="position:absolute;"
        translate="TRANSLATE.COUPON_ASSIGNMENTS_BADGE_COUPON_ASSIGNMENT_IS_ACTIVE"></span>
    </span>
  </ng-template>

  <ng-template #assidnedOn let-data="adtData" let-emitter="captureEvents">
    <span>{{data.AssignedOn | c3Date}}</span>
  </ng-template>

  <ng-template #couponApplicability let-data="adtData" let-emitter="captureEvents">
    <span>{{data.CouponApplicability | c3Date}}</span>
  </ng-template>

  <!-- Check if datatableConfig is defined and then render the table -->
  <ng-container *ngIf="datatableConfig">
    <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig">
    </app-c3-table>
