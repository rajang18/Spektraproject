<ng-template #actionHeader>
    <div class="header-actions d-flex align-items-center gap-2 gap-lg-3">
        <div class="dropdown" appClickOutSide (clickOutside)="closeDropdown()">
            <div class="d-flex">
                <button (click)="toggleDropdown()"
                    class="btn-content btn btn-sm col-12 d-flex justify-content-between">
                    {{
                    billingPeriodId
                    ? (billingPeriods | showSelectedFirstPeriod : billingPeriodId)
                    : null
                    }}
                    <strong>
                        <i class="ki-duotone ki-down"></i>
                    </strong>
                </button>
            </div>
            <div class="dropdown-content" [class.show]="dropdownVisible">
                @for (periodData of billingPeriods; track periodData) {
                <label (click)="checkBillingPeriodChange(periodData)"
                    [ngClass]="{'selected': billingPeriodId === periodData?.BillingPeriodId}">
                    {{periodData.BillingStartDate |c3Date}} - {{periodData.BillingEndDate
                    |c3Date}}
                    ({{periodData.BillingId}})
                </label>
                }
            </div>
        </div>
        <button type="button" class="btn btn-sm fw-bold btn-light-primary" (click)="downloadUsageHistory()">
            <i
                class="ki-outline ki-exit-down fs-2 pe-1"></i><span class="ps-1">{{'TRANSLATE.REPORT_USAGE_DOWNLOAD_LAST_UPLOADED_DETAILS'|translate}}</span>
        </button>
        <button type="button" class="btn btn-sm fw-bold btn-light-primary" [routerLink]="['/partner/reportusage']">
            <i
                class="ki-outline ki-to-left fs-2"></i><span>{{'TRANSLATE.REPORT_PARTNER_OFFERS_USAGE_BACK_TO_UPLOAD'|translate}}</span>
        </button>
    </div>
</ng-template>
<div class="card">
    <div class="card-body pt-0 overflow-auto">
        <ng-template #costonpartner let-data="adtData" let-emitter="captureEvents">
            <div> {{data.CostToPartner | CurrencyFilter : data.CurrencySymbol : data.CurrencyDecimalPlaces :
                data.CurrencyThousandSeperator : data.CurrencyDecimalSeperator}}</div>
        </ng-template>
        <ng-template #usagedate let-data="adtData" let-emitter="captureEvents">
            {{data.UsageDate | c3Date}}
        </ng-template>
        <ng-container *ngIf="datatableConfig">
            <app-c3-table [reload]="reloadEvent" [datatableConfig]="datatableConfig">
            </app-c3-table>
        </ng-container>
    </div>
</div>
