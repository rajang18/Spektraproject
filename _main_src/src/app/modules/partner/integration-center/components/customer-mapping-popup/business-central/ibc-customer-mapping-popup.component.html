<div class="modal-dialog m-auto w-100">
    <div class="modal-content">
        <div class="d-flex justify-content-center align-items-center py-10" *ngIf="isLoading"> 
            <span class="spinner-border text-primary" role="status"></span>
            <span class="text-muted fs-6 fw-semibold ms-5">{{'TRANSLATE.LOADING_MESSAGE' | translate}}</span>
        </div>

        <div class="modal-header" [class.d-none]="isLoading">
           <h4 class="modal-title"
            [innerHTML]="('TRANSLATE.BUSINESS_CENTRAL_EXTERNAL_CUSTOMER_MAPPING_POPUP_TITLE_TEXT')
            | translate:{ companyName: companyName, companyId: companyId }"></h4>
            <div class="btn btn-sm btn-icon btn-active-color-primary" (click)="closeModalPopup()"
                    data-bs-dismiss="modal">
                    <i class="ki-duotone ki-cross fs-1"><span class="path1"></span><span class="path2"></span></i>
                </div>
        </div>
        <div class="modal-body" id="modal-body" [class.d-none]="isLoading">

            <ng-template #radioButton let-data="adtData" let-emitter="captureEvents">
                <div class="input-group-with-radio ps-2">
                        <input type="radio" name="radio" class="form-check-input mb-2" [checked]="data.BusinessCentralCustomerId === selectedCustomerId"
                            (change)="updateSelectedList(data)">
                    <span>
                        {{data.BusinessCentralCustomerName}}
                        <span class="text-muted small d-block"> {{data.BusinessCentralCustomerId}}</span>
                    </span>
                    <!-- <input type="radio" [(ngModel)]="data.IsSelected" [value]="true" name="radio" (change)="updateSelectedList(data)" required> -->
                </div>
            </ng-template>
            <div class="col-md-10 mb-0 pb-0">
                <input class="form-control" [(ngModel)]="name" (keyup)="onNameChange($event)" type="text" name="radio"
                    placeholder="{{'TRANSLATE.PLACEHOLDER_FOR_TEXT_SEARCH_BY_NAME' | translate}}">
            </div>
            <ng-container *ngIf="activeEntitiesDatatableConfig">
                <div class="custom-height" [ngClass]="activeCustomers?.length === 0 ? 'no-height' : ''" [class.d-none]="isLoading">
                <app-c3-table [datatableConfig]="activeEntitiesDatatableConfig" [reload]="reloadEvent"
                    [searchFilter]=false>
                </app-c3-table>
                </div>
            </ng-container>
        </div>
        <div class="modal-footer " [class.d-none]="isLoading">
            <button type="button" class="btn  btn-light btn-active-light-primary" data-bs-dismiss="modal"
                (click)="closeModalPopup()">{{'TRANSLATE.BUTTON_TEXT_CANCEL' | translate}}</button>
            <button type="button" class="btn btn-primary btn-xs mr-2" data-bs-dismiss="modal"
                (click)="Submit()">{{'TRANSLATE.BUTTON_TEXT_SUBMIT' | translate}}</button>
        </div>
        
    </div>
</div>
